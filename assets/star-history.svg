  <text class="label" x="605" y="340" text-anchor="middle">Jul 16</text>
  <text class="label" x="736" y="340" text-anchor="middle">Jul 18</text>

  <path class="area" d="M80 312 L146 312 L211 312 L277 312 L342 312 L408 266 L474 243 L539 220 L605 105 L670 82 L736 82 L736 312 Z" />
  <polyline class="line" points="80,312 146,312 211,312 277,312 342,312 408,266 474,243 539,220 605,105 670,82 736,82" />

  <circle class="point" cx="408" cy="266" r="5" />
