<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Codex Pro Bridge star history</title>
  <desc id="desc">Cumulative GitHub stars from July 8 to July 18, 2026, rising from zero to ten.</desc>
  <style>
    .background { fill: #ffffff; }
    .border { fill: none; stroke: #d0d7de; }
    .grid { stroke: #d8dee4; stroke-width: 1; }
    .axis { stroke: #8c959f; stroke-width: 1.5; }
    .label { fill: #57606a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { fill: #24292f; font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #57606a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .area { fill: #2da44e; fill-opacity: 0.12; }
    .line { fill: none; stroke: #1f883d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .point { fill: #ffffff; stroke: #1f883d; stroke-width: 3; }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0d1117; }
      .border { stroke: #30363d; }
      .grid { stroke: #30363d; }
      .axis { stroke: #6e7681; }
      .label, .subtitle { fill: #8b949e; }
      .heading { fill: #e6edf3; }
      .area { fill: #3fb950; fill-opacity: 0.15; }
      .line { stroke: #3fb950; }
      .point { fill: #0d1117; stroke: #3fb950; }
    }
  </style>

  <rect class="background" width="800" height="400" rx="8" />
  <rect class="border" x="0.5" y="0.5" width="799" height="399" rx="8" />

  <text class="heading" x="64" y="38">Star History</text>
  <text class="subtitle" x="64" y="60">WILLOSCAR/codex-pro-bridge · updated 2026-07-18</text>

  <line class="grid" x1="80" y1="82" x2="736" y2="82" />
  <line class="grid" x1="80" y1="128" x2="736" y2="128" />
  <line class="grid" x1="80" y1="174" x2="736" y2="174" />
  <line class="grid" x1="80" y1="220" x2="736" y2="220" />
  <line class="grid" x1="80" y1="266" x2="736" y2="266" />
  <line class="grid" x1="80" y1="312" x2="736" y2="312" />

  <line class="axis" x1="80" y1="82" x2="80" y2="312" />
  <line class="axis" x1="80" y1="312" x2="736" y2="312" />

