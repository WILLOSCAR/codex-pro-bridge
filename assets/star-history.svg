  <circle class="point" cx="539" cy="220" r="5" />
  <circle class="point" cx="605" cy="105" r="5" />
  <circle class="point" cx="670" cy="82" r="5" />
  <circle class="point" cx="736" cy="82" r="5" />

  <text class="label" x="408" y="370" text-anchor="middle">Date</text>
  <text class="label" x="20" y="197" text-anchor="middle" transform="rotate(-90 20 197)">Stars</text>
</svg>
