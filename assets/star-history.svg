  <text class="label" x="56" y="225">4</text>
  <text class="label" x="56" y="179">6</text>
  <text class="label" x="56" y="133">8</text>
  <text class="label" x="48" y="87">10</text>

  <text class="label" x="80" y="340" text-anchor="middle">Jul 8</text>
  <text class="label" x="211" y="340" text-anchor="middle">Jul 10</text>
  <text class="label" x="342" y="340" text-anchor="middle">Jul 12</text>
